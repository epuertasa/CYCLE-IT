<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Defs for complex gradients and drop shadows to give a premium 3D / glowing glass effect -->
  <defs>
    <!-- Main leaf gradient - Dark Emerald to Cyan-Green -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Tech chip gradient - Deep Blue/Slate to Bright Teal -->
    <linearGradient id="techGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="dropGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#10b981" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g transform="translate(250, 250)">
    
    <!-- Outer Abstract Data Ring -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="6" stroke-dasharray="150 45" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="40s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="215" fill="none" stroke="url(#techGrad)" stroke-width="2" stroke-dasharray="80 120" stroke-opacity="0.6">
       <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" />
    </circle>
    
    <!-- Central Geometric Badge (Geodesic / Isometric look) -->
    <g filter="url(#dropGlow)">
      <!-- Left side (The tech chip) -->
      <path d="M 0,-140 L 0,-20 L -100,50 L -100,-70 Z" fill="url(#techGrad)" />
      
      <!-- Right side (The organic leaf) -->
      <path d="M 0,-140 L 100,-70 L 100,50 L 0,-20 Z" fill="url(#leafGrad)" />
      
      <!-- Bottom pyramid -->
      <path d="M 0,-20 L 100,50 L 0,120 L -100,50 Z" fill="#047857" opacity="0.9" />
    </g>

    <!-- Inner Circuit Detail Highlights -->
    <g stroke="#6ee7b7" stroke-width="3" stroke-linecap="round" fill="none">
       <!-- Circuit path 1 -->
       <path d="M -50,-45 L -20,-25 L -20,10" />
       <circle cx="-20" cy="10" r="4" fill="#6ee7b7" />
       
       <!-- Circuit path 2 -->
       <path d="M 50,-45 L 20,-25 L 20,40" />
       <circle cx="20" cy="40" r="4" fill="#6ee7b7" />
       
       <!-- Inner node connections -->
       <path d="M -30,65 L 0,85 L 30,65" opacity="0.5" stroke-width="2"/>
    </g>
    
    <!-- Glowing core center spot -->
    <circle cx="0" cy="-20" r="10" fill="#a7f3d0" filter="url(#glow)" />
    
  </g>
</svg>
